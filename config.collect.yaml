# Example engine config for running openwiki locally.
#
# Start the engine from a directory containing this file:
#   iii -c config.yaml
# Then, in another terminal, run the worker:
#   III_URL=ws://127.0.0.1:49134 node src/index.mjs
#
# openwiki depends on these workers being present on the engine:
workers:
  - name: configuration   # openwiki registers its config schema here
  - name: iii-state       # wiki content persistence
  - name: iii-http        # serves the /openwiki UI + JSON API
  - name: iii-cron        # nightly refresh
  - name: llm-router      # openwiki calls router::complete
  # A model provider must be installed and configured in the llm-router config,
  # for example:
  # - name: provider-anthropic
